name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      plan_only:
        description: "true면 terraform plan만 실행하고 apply/배포는 건너뜀 (운영 시크릿으로 안전하게 변경분 검토용)"
        type: boolean
        default: false

permissions:
  id-token: write   # OIDC 토큰 발급 필수
  contents: read

env:
  AWS_REGION: ap-northeast-2
  PROJECT_NAME: ai-innovation

jobs:
  # ────────────────────────────────────────────
  # Job 1: Docker 이미지 빌드 → ECR 푸시
  # ────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build \
            -f backend/Dockerfile \
            -t $REGISTRY/$PROJECT_NAME-backend:$TAG \
            -t $REGISTRY/$PROJECT_NAME-backend:latest \
            .

      # 5개 서비스가 동일한 이미지를 공유 — 각 ECR 레포에 푸시
      - name: Push to all ECR repositories
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          SERVICES="backend crm recommend generate data-registration"
          for SERVICE in $SERVICES; do
            docker tag \
              $REGISTRY/$PROJECT_NAME-backend:$TAG \
              $REGISTRY/$PROJECT_NAME-$SERVICE:$TAG
            docker tag \
              $REGISTRY/$PROJECT_NAME-backend:$TAG \
              $REGISTRY/$PROJECT_NAME-$SERVICE:latest
            docker push $REGISTRY/$PROJECT_NAME-$SERVICE:$TAG
            docker push $REGISTRY/$PROJECT_NAME-$SERVICE:latest
          done

  # ────────────────────────────────────────────
  # Job 2: Terraform apply (인프라 + ECS 배포)
  # ────────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Get AWS Account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Terraform Init
        working-directory: infra/ec2
        run: terraform init

      # setup.sh를 내용 해시로 버전 키화해 apply 전에 S3 업로드.
      # EC2 부트스트랩이 이 해시 키만 받으므로 낡은 setup.sh를 받는 race가 사라진다.
      # (S3 버킷은 기존 인프라에 이미 존재. 최초 배포 시엔 package job이 동일 키를 재업로드)
      - name: Upload versioned opensearch_setup.sh to S3
        id: setup-hash
        run: |
          HASH=$(sha256sum infra/ec2/user_data/opensearch_setup.sh | cut -c1-16)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          aws s3 cp infra/ec2/user_data/opensearch_setup.sh \
            "s3://${PROJECT_NAME}-deploy/opensearch_setup.${HASH}.sh" \
            || echo "bucket not ready (first deploy) — package job will upload"

      - name: Upload versioned opensearch_api_setup.sh to S3
        id: setup-hash-api
        run: |
          HASH=$(sha256sum infra/ec2/user_data/opensearch_api_setup.sh | cut -c1-16)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          aws s3 cp infra/ec2/user_data/opensearch_api_setup.sh \
            "s3://${PROJECT_NAME}-deploy/opensearch_api_setup.${HASH}.sh" \
            || echo "bucket not ready (first deploy) — package job will upload"

      - name: Terraform Plan or Apply
        working-directory: infra/ec2
        run: |
          if [ "${{ inputs.plan_only }}" = "true" ]; then
            terraform plan -no-color
          else
            terraform apply -auto-approve
          fi
        env:
          # ── 인프라 설정 ──
          TF_VAR_aws_region:    ${{ env.AWS_REGION }}
          TF_VAR_environment:   production
          TF_VAR_ecr_registry:  "${{ steps.account.outputs.id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          TF_VAR_ecr_image_tag: ${{ github.sha }}
          TF_VAR_opensearch_setup_hash:     ${{ steps.setup-hash.outputs.hash }}
          TF_VAR_opensearch_api_setup_hash: ${{ steps.setup-hash-api.outputs.hash }}

          # ── 시크릿 (GitHub Secrets에서 주입) ──
          TF_VAR_opensearch_admin_password: ${{ secrets.OPENSEARCH_ADMIN_PASSWORD }}
          TF_VAR_postgres_password:    ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_internal_token:       ${{ secrets.INTERNAL_TOKEN }}
          TF_VAR_jwt_secret:           ${{ secrets.JWT_SECRET }}
          TF_VAR_openai_api_key:       ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_anthropic_api_key:    ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_allowed_origins:      ${{ secrets.ALLOWED_ORIGINS }}
          TF_VAR_chatgpt_model_name:   ${{ vars.CHATGPT_MODEL_NAME }}
          TF_VAR_parser_model_name:    ${{ vars.PARSER_MODEL_NAME }}

          # ── Admin 시드 (최초 배포 시만 설정, 이후 GitHub Secrets에서 삭제) ──
          TF_VAR_admin_seed_email:     ${{ secrets.ADMIN_SEED_EMAIL }}
          TF_VAR_admin_seed_password:  ${{ secrets.ADMIN_SEED_PASSWORD }}

      - name: Export Terraform outputs
        id: tf-outputs
        if: ${{ !inputs.plan_only }}
        working-directory: infra/ec2
        run: |
          echo "db_instance_id=$(terraform output -raw db_ec2_instance_id)" >> $GITHUB_OUTPUT
          echo "opensearch_instance_id=$(terraform output -raw opensearch_ec2_instance_id)" >> $GITHUB_OUTPUT
          echo "opensearch_api_instance_id=$(terraform output -raw opensearch_api_ec2_instance_id)" >> $GITHUB_OUTPUT
          echo "opensearch_api_launch_template_id=$(terraform output -raw opensearch_api_launch_template_id)" >> $GITHUB_OUTPUT
          echo "opensearch_api_asg_name=$(terraform output -raw opensearch_api_asg_name)" >> $GITHUB_OUTPUT
          echo "cloudfront_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_s3_bucket)" >> $GITHUB_OUTPUT

    outputs:
      db_instance_id:                     ${{ steps.tf-outputs.outputs.db_instance_id }}
      opensearch_instance_id:             ${{ steps.tf-outputs.outputs.opensearch_instance_id }}
      opensearch_api_instance_id:         ${{ steps.tf-outputs.outputs.opensearch_api_instance_id }}
      opensearch_api_launch_template_id:  ${{ steps.tf-outputs.outputs.opensearch_api_launch_template_id }}
      opensearch_api_asg_name:            ${{ steps.tf-outputs.outputs.opensearch_api_asg_name }}
      cloudfront_dist_id:                 ${{ steps.tf-outputs.outputs.cloudfront_dist_id }}
      frontend_bucket:                    ${{ steps.tf-outputs.outputs.frontend_bucket }}

  # ────────────────────────────────────────────
  # Job 3: 데이터 서비스 코드 패키징 → S3 업로드
  # build-and-push와 병렬 실행 가능하나, terraform이 S3 버킷을 먼저 생성해야 하므로
  # terraform job 이후에 실행 (S3 버킷 생성 보장)
  # ────────────────────────────────────────────
  package-data-services:
    name: Package & Upload Data Services
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ !inputs.plan_only }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload versioned opensearch_setup.sh to S3 (first-deploy safety net)
        run: |
          HASH=$(sha256sum infra/ec2/user_data/opensearch_setup.sh | cut -c1-16)
          aws s3 cp infra/ec2/user_data/opensearch_setup.sh \
            "s3://${{ env.PROJECT_NAME }}-deploy/opensearch_setup.${HASH}.sh"

      - name: Upload versioned opensearch_api_setup.sh to S3 (first-deploy safety net)
        run: |
          HASH=$(sha256sum infra/ec2/user_data/opensearch_api_setup.sh | cut -c1-16)
          aws s3 cp infra/ec2/user_data/opensearch_api_setup.sh \
            "s3://${{ env.PROJECT_NAME }}-deploy/opensearch_api_setup.${HASH}.sh"

      - name: Cache OpenSearch tarball in S3 (skip if already uploaded)
        run: |
          OPENSEARCH_VERSION="2.13.0"
          S3_KEY="opensearch-${OPENSEARCH_VERSION}-linux-x64.tar.gz"
          if aws s3 ls "s3://${{ env.PROJECT_NAME }}-deploy/${S3_KEY}" > /dev/null 2>&1; then
            echo "OpenSearch tarball already cached in S3, skipping."
          else
            echo "Downloading OpenSearch ${OPENSEARCH_VERSION} and uploading to S3..."
            curl -fsSL \
              "https://artifacts.opensearch.org/releases/bundle/opensearch/${OPENSEARCH_VERSION}/opensearch-${OPENSEARCH_VERSION}-linux-x64.tar.gz" \
              -o /tmp/opensearch-dist.tar.gz
            aws s3 cp /tmp/opensearch-dist.tar.gz \
              "s3://${{ env.PROJECT_NAME }}-deploy/${S3_KEY}"
            echo "OpenSearch tarball cached."
          fi

      - name: Package & upload Database API
        run: |
          tar -czf /tmp/database.tar.gz -C database .
          aws s3 cp /tmp/database.tar.gz s3://${{ env.PROJECT_NAME }}-deploy/database.tar.gz

      - name: Package & upload OpenSearch API
        run: |
          mkdir -p opensearch/data
          cp backend/app/agents/generate_message_agent/data/forbidden_keyword.json opensearch/data/
          tar -czf /tmp/opensearch.tar.gz -C opensearch .
          aws s3 cp /tmp/opensearch.tar.gz s3://${{ env.PROJECT_NAME }}-deploy/opensearch.tar.gz

      - name: Package & upload product data files
        run: |
          tar -czf /tmp/data.tar.gz -C . data/
          aws s3 cp /tmp/data.tar.gz s3://${{ env.PROJECT_NAME }}-deploy/data.tar.gz

  # ────────────────────────────────────────────
  # Job 4: SSM Run Command로 EC2에 최신 코드 배포 + 서비스 재시작
  # ────────────────────────────────────────────
  deploy-data-services:
    name: Deploy Data Services via SSM
    runs-on: ubuntu-latest
    needs: [terraform, package-data-services]
    if: ${{ !inputs.plan_only }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for DB EC2 user_data to complete
        run: |
          echo "Waiting for DB EC2 user_data to complete..."
          for i in $(seq 1 40); do
            RESULT=$(aws ssm send-command \
              --instance-ids "${{ needs.terraform.outputs.db_instance_id }}" \
              --document-name "AWS-RunShellScript" \
              --parameters '{"commands":["test -f /var/log/user-data-complete && echo OK || echo WAIT"]}' \
              --output text --query "Command.CommandId")
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$RESULT" \
              --instance-id "${{ needs.terraform.outputs.db_instance_id }}" \
              --query "StandardOutputContent" --output text 2>/dev/null || echo "WAIT")
            echo "Attempt $i: $STATUS"
            if echo "$STATUS" | grep -q "OK"; then
              echo "DB EC2 user_data complete."
              break
            fi
            if [ "$i" = "40" ]; then
              echo "ERROR: DB EC2 user_data did not complete within 20 minutes."
              exit 1
            fi
            sleep 25
          done

      - name: Deploy to DB EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ needs.terraform.outputs.db_instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "/usr/local/bin/aws s3 cp s3://${{ env.PROJECT_NAME }}-deploy/database.tar.gz /tmp/database.tar.gz",
              "tar -xzf /tmp/database.tar.gz -C /opt/db-api",
              "/opt/db-api/venv/bin/pip install -q -r /opt/db-api/requirements.txt",
              "chown -R ubuntu:ubuntu /opt/db-api",
              "for f in $(ls /opt/db-api/init/*.sql 2>/dev/null | sort); do sudo -u postgres psql -d ai_innovation_db -f \"$f\" 2>&1 | grep -v \"already exists\" || true; done",
              "printf \"INTERNAL_TOKEN=${{ secrets.INTERNAL_TOKEN }}\\nPOSTGRES_HOST=localhost\\nPOSTGRES_DB=ai_innovation_db\\nPOSTGRES_USER=postgres\\nPOSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}\\n\" > /opt/db-api/.env && chmod 600 /opt/db-api/.env && chown ubuntu:ubuntu /opt/db-api/.env",
              "systemctl restart db-api",
              "/usr/local/bin/aws s3 cp s3://${{ env.PROJECT_NAME }}-deploy/data.tar.gz /tmp/data.tar.gz",
              "mkdir -p /opt/data && tar -xzf /tmp/data.tar.gz -C /opt/ && chown -R ubuntu:ubuntu /opt/data",
              "sudo -u ubuntu /opt/db-api/venv/bin/python /opt/db-api/seed_products.py"
            ]}' \
            --output text --query "Command.CommandId")
          echo "SSM Command ID (db): $COMMAND_ID"
          for i in $(seq 1 36); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ needs.terraform.outputs.db_instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then echo "DB deploy success."; break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ needs.terraform.outputs.db_instance_id }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

      - name: Wait for OpenSearch EC2 user_data to complete
        run: |
          echo "Waiting for OpenSearch EC2 user_data to complete..."
          for i in $(seq 1 80); do
            RESULT=$(aws ssm send-command \
              --instance-ids "${{ needs.terraform.outputs.opensearch_instance_id }}" \
              --document-name "AWS-RunShellScript" \
              --parameters '{"commands":["test -f /var/log/user-data-complete && echo OK || echo WAIT"]}' \
              --output text --query "Command.CommandId")
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$RESULT" \
              --instance-id "${{ needs.terraform.outputs.opensearch_instance_id }}" \
              --query "StandardOutputContent" --output text 2>/dev/null || echo "WAIT")
            echo "Attempt $i: $STATUS"
            if echo "$STATUS" | grep -q "OK"; then
              echo "OpenSearch EC2 user_data complete."
              break
            fi
            if [ "$i" = "80" ]; then
              echo "ERROR: OpenSearch EC2 user_data did not complete within 40 minutes."
              exit 1
            fi
            sleep 25
          done

      - name: Deploy to OpenSearch EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ needs.terraform.outputs.opensearch_instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters '{"commands":[
              "/usr/local/bin/aws s3 cp s3://${{ env.PROJECT_NAME }}-deploy/opensearch.tar.gz /tmp/opensearch.tar.gz",
              "mkdir -p /opt/opensearch-api && tar -xzf /tmp/opensearch.tar.gz -C /opt/opensearch-api",
              "chmod +x /opt/opensearch-api/restore_or_skip.sh /opt/opensearch-api/create_snapshot.sh",
              "chown -R ubuntu:ubuntu /opt/opensearch-api"
            ]}' \
            --output text --query "Command.CommandId")
          echo "SSM Command ID (opensearch): $COMMAND_ID"
          for i in $(seq 1 120); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ needs.terraform.outputs.opensearch_instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then echo "OpenSearch deploy success."; break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ needs.terraform.outputs.opensearch_instance_id }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            if [ "$i" = "120" ]; then
              echo "ERROR: OpenSearch deploy did not complete within 30 minutes."
              exit 1
            fi
          done

      # ── OpenSearch API: 골든 AMI 빌드 + ASG 인스턴스 리프레시 ──────────────
      # 단일 EC2에 직접 SSM 배포하던 방식(위 OpenSearch EC2/DB EC2와 동일 패턴)을 더는
      # 쓰지 않는다 — ASG가 매번 새로 띄우는 인스턴스는 그 SSM 배포를 받을 기회가 없어
      # 코드 없이 부팅→크래시 루프에 빠지기 때문(opensearch_api_setup.sh:118 주석).
      # 대신: 빌더 역할을 기존 단일 인스턴스(aws_instance.opensearch_api)가 그대로 맡는다 —
      # launch template으로 새 빌더를 매번 띄우면 보조 25GB EBS 데이터 볼륨이 launch
      # template에 정의돼 있지 않아(block_device_mappings 없음) venv/모델을 찾지 못해 콜드
      # 부트스트랩이 실패한다. 그 볼륨을 영구히 launch template에 추가하면 골든 AMI가 생긴
      # 뒤에는 반대로 AMI의 데이터 스냅샷을 빈 볼륨으로 덮어써버리는 문제가 생겨, 두 상태를
      # 동시에 만족시킬 수 없다. 이미 볼륨/venv/모델이 정상 구성된 기존 인스턴스를 빌더로
      # 고정하면 이 문제가 원천적으로 없어진다 — 컷오버(opensearch_api_use_nlb=true) 이후
      # 이 인스턴스를 정리할 때 빌더 전략을 다시 설계해야 한다(지금은 범위 밖).
      - name: Deploy code to OpenSearch API builder (existing instance) via SSM
        run: |
          BUILDER_ID="${{ needs.terraform.outputs.opensearch_api_instance_id }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$BUILDER_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 1800 \
            --parameters '{"commands":[
              "/usr/local/bin/aws s3 cp s3://${{ env.PROJECT_NAME }}-deploy/opensearch.tar.gz /tmp/opensearch.tar.gz",
              "mkdir -p /opt/opensearch-api && tar -xzf /tmp/opensearch.tar.gz -C /opt/opensearch-api",
              "/usr/local/bin/aws s3 cp s3://${{ env.PROJECT_NAME }}-deploy/data.tar.gz /tmp/data.tar.gz",
              "mkdir -p /opt/data && tar -xzf /tmp/data.tar.gz -C /opt/",
              "chmod +x /opt/opensearch-api/index_forbidden.sh",
              "for i in $(seq 1 60); do [ -f /var/log/venv-ready ] && break; echo \"Waiting for venv ($i/60)...\"; sleep 30; done; [ -f /var/log/venv-ready ] || { echo ERROR: venv not ready; exit 1; }",
              "/data/opensearch-api-venv/bin/pip install -q -r /opt/opensearch-api/requirements.txt",
              "chown -R ubuntu:ubuntu /opt/opensearch-api",
              "systemctl stop opensearch-api 2>/dev/null || true",
              "/opt/opensearch-api/index_forbidden.sh",
              "systemctl restart opensearch-api"
            ]}' \
            --output text --query "Command.CommandId")
          echo "SSM Command ID (opensearch-api builder): $COMMAND_ID"
          for i in $(seq 1 120); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$BUILDER_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then echo "Builder deploy success."; break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$BUILDER_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            if [ "$i" = "120" ]; then
              echo "ERROR: Builder deploy did not complete within 30 minutes."
              exit 1
            fi
          done

      - name: Verify builder health before baking AMI
        run: |
          BUILDER_ID="${{ needs.terraform.outputs.opensearch_api_instance_id }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$BUILDER_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["curl -sf http://localhost:8010/health && echo HEALTH_OK"]}' \
            --output text --query "Command.CommandId")
          sleep 10
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$BUILDER_ID" \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "")
          echo "$STATUS"
          echo "$STATUS" | grep -q "HEALTH_OK" || { echo "ERROR: builder /health check failed — aborting before AMI bake"; exit 1; }

      - name: Bake golden AMI from builder
        id: bake-ami
        run: |
          BUILDER_ID="${{ needs.terraform.outputs.opensearch_api_instance_id }}"
          # --no-reboot: opensearch_api_use_nlb=false(기본값)인 동안은 ECS가 여전히 이
          # 인스턴스의 private IP로 운영 트래픽을 직접 보낸다. --no-reboot 없이 create-image를
          # 호출하면 AWS가 파일시스템 일관성을 위해 기본적으로 이 인스턴스를 재부팅시켜,
          # 컷오버 전까지 배포마다 운영 중인 opensearch-api가 짧게 끊긴다. 직전 SSM 스텝에서
          # 이미 systemctl restart로 서비스를 깨끗하게 재시작했으므로 --no-reboot로 스냅샷을
          # 떠도 파일시스템 일관성 위험은 낮다.
          AMI_ID=$(aws ec2 create-image \
            --instance-id "$BUILDER_ID" \
            --name "${{ env.PROJECT_NAME }}-opensearch-api-${{ github.sha }}" \
            --no-reboot \
            --query "ImageId" --output text)
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Waiting for AMI $AMI_ID to become available..."
          aws ec2 wait image-available --image-ids "$AMI_ID"
          echo "AMI $AMI_ID available."

      - name: Publish new launch template version
        run: |
          # --source-version 1: Terraform이 관리하는 버전 1(보안그룹/IAM/user_data 등)을
          # 그대로 물려받고 ImageId만 갱신한다 — $Latest를 source로 쓰면 이전 CI 실행의
          # 버전을 계속 물고 가게 되어 의도치 않은 드리프트가 누적될 수 있다.
          aws ec2 create-launch-template-version \
            --launch-template-id "${{ needs.terraform.outputs.opensearch_api_launch_template_id }}" \
            --source-version 1 \
            --launch-template-data "{\"ImageId\":\"${{ steps.bake-ami.outputs.ami_id }}\"}" \
            --version-description "${{ github.sha }}"

      - name: Roll ASG instances to new AMI
        run: |
          ASG_NAME="${{ needs.terraform.outputs.opensearch_api_asg_name }}"
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage":90,"InstanceWarmup":90}' \
            --query "InstanceRefreshId" --output text)
          echo "Instance refresh: $REFRESH_ID"
          for i in $(seq 1 60); do
            sleep 30
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query "InstanceRefreshes[0].Status" --output text)
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "Successful" ]; then echo "Instance refresh complete."; break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "ERROR: instance refresh $STATUS"
              exit 1
            fi
            if [ "$i" = "60" ]; then
              echo "ERROR: instance refresh did not complete within 30 minutes."
              exit 1
            fi
          done

      - name: Restore OpenSearch indices from S3 snapshot if empty
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ needs.terraform.outputs.opensearch_instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters '{"commands":["/opt/opensearch-api/restore_or_skip.sh"]}' \
            --output text --query "Command.CommandId")
          echo "SSM Command ID (restore): $COMMAND_ID"
          for i in $(seq 1 40); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ needs.terraform.outputs.opensearch_instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then echo "Restore step complete."; break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ needs.terraform.outputs.opensearch_instance_id }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            if [ "$i" = "40" ]; then
              echo "ERROR: Restore step did not complete within 10 minutes."
              exit 1
            fi
          done

  # ────────────────────────────────────────────
  # Job 5: 프론트엔드 빌드 → S3 업로드 → CloudFront 캐시 무효화
  # terraform job 완료 후 실행 (CloudFront/S3 리소스 생성 보장)
  # ────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ !inputs.plan_only }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      # index.html: no-cache (항상 최신 진입점 보장)
      # JS/CSS/assets: 1년 immutable 캐싱 (hash 파일명으로 캐시버스팅)
      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.terraform.outputs.frontend_bucket }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp frontend/dist/index.html \
            s3://${{ needs.terraform.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cloudfront_dist_id }} \
            --paths "/*"
