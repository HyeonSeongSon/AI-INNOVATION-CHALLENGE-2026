name: Create OpenSearch Snapshot

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  PROJECT_NAME: ai-innovation

jobs:
  create-snapshot:
    name: Create OpenSearch Snapshot to S3
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get OpenSearch EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=${{ env.PROJECT_NAME }}-ec2-opensearch" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "OpenSearch instance: $INSTANCE_ID"

      - name: Create snapshot via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters '{"commands":["/opt/opensearch-api/create_snapshot.sh"]}' \
            --output text --query "Command.CommandId")
          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 20); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Snapshot created successfully."
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardOutputContent" --output text
              break
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            if [ "$i" = "20" ]; then
              echo "ERROR: Snapshot creation timed out."
              exit 1
            fi
          done
