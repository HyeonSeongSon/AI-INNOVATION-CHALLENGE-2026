<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Agent 테스트 클라이언트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .step {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .step h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .products {
            display: grid;
            gap: 15px;
            margin-top: 15px;
        }

        .product-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .product-card.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .product-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .product-info {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .message-result {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .message-result h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .message-result p {
            color: #333;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: bold;
        }

        .error {
            background: #ffe0e0;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 CRM Agent 테스트 클라이언트</h1>

        <!-- 1단계: 메시지 입력 -->
        <div class="step" id="step1">
            <h2>1단계: 메시지 입력</h2>
            <textarea id="userMessage" placeholder="예시: PERSONA_002로 신상품 홍보용 립스틱 광고 만들어줘"></textarea>
            <button onclick="startRecommendation()">상품 추천 시작</button>
            <div id="step1Loading" class="loading hidden">추천 중...</div>
            <div id="step1Error" class="error hidden"></div>
        </div>

        <!-- 2단계: 상품 선택 -->
        <div class="step hidden" id="step2">
            <h2>2단계: 상품 선택</h2>
            <div id="products" class="products"></div>
            <button onclick="generateMessage()" id="selectBtn" disabled>선택 완료</button>
            <div id="step2Loading" class="loading hidden">메시지 생성 중...</div>
            <div id="step2Error" class="error hidden"></div>
        </div>

        <!-- 3단계: 결과 -->
        <div class="step hidden" id="step3">
            <h2>3단계: 생성된 CRM 메시지</h2>
            <div id="result" class="message-result"></div>
            <button onclick="reset()">처음부터 다시</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        let sessionId = null;
        let selectedIndex = null;

        // 1단계: 상품 추천 시작
        async function startRecommendation() {
            const userMessage = document.getElementById('userMessage').value.trim();

            if (!userMessage) {
                alert('메시지를 입력해주세요');
                return;
            }

            // UI 업데이트
            document.getElementById('step1Loading').classList.remove('hidden');
            document.getElementById('step1Error').classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/api/crm/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_message: userMessage
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                sessionId = data.session_id;

                // 상품 표시
                displayProducts(data.products);

                // 2단계 표시
                document.getElementById('step2').classList.remove('hidden');

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('step1Error').textContent = `오류: ${error.message}`;
                document.getElementById('step1Error').classList.remove('hidden');
            } finally {
                document.getElementById('step1Loading').classList.add('hidden');
            }
        }

        // 상품 목록 표시
        function displayProducts(products) {
            const container = document.getElementById('products');
            container.innerHTML = '';

            products.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => selectProduct(index);

                const price = typeof product.판매가 === 'number' ?
                    product.판매가.toLocaleString() : product.판매가;

                card.innerHTML = `
                    <h3>${index}. ${product.상품명}</h3>
                    <div class="product-info">
                        <div>브랜드: ${product.브랜드}</div>
                        <div>가격: ${price}원 (할인율: ${product.할인율 || 0}%)</div>
                        <div>평점: ${product.별점 || 'N/A'} (${product.리뷰_갯수 || 0}개 리뷰)</div>
                        ${product.vector_search_score ? `<div>검색 점수: ${product.vector_search_score.toFixed(4)}</div>` : ''}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // 상품 선택
        function selectProduct(index) {
            // 이전 선택 해제
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.remove('selected');
            });

            // 새로운 선택
            document.querySelectorAll('.product-card')[index].classList.add('selected');
            selectedIndex = index;

            // 버튼 활성화
            document.getElementById('selectBtn').disabled = false;
        }

        // 2단계: 메시지 생성
        async function generateMessage() {
            if (selectedIndex === null) {
                alert('상품을 선택해주세요');
                return;
            }

            // UI 업데이트
            document.getElementById('step2Loading').classList.remove('hidden');
            document.getElementById('step2Error').classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/api/crm/select`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        selected_index: selectedIndex
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 결과 표시
                displayResult(data);

                // 3단계 표시
                document.getElementById('step3').classList.remove('hidden');

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('step2Error').textContent = `오류: ${error.message}`;
                document.getElementById('step2Error').classList.remove('hidden');
            } finally {
                document.getElementById('step2Loading').classList.add('hidden');
            }
        }

        // 결과 표시
        function displayResult(data) {
            const container = document.getElementById('result');
            container.innerHTML = `
                <h3>📝 ${data.title}</h3>
                <p>${data.message}</p>
                <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
                <div style="color: #666; font-size: 14px;">
                    <strong>선택된 상품:</strong> ${data.selected_product.상품명} (${data.selected_product.브랜드})
                </div>
            `;
        }

        // 초기화
        function reset() {
            sessionId = null;
            selectedIndex = null;

            document.getElementById('userMessage').value = '';
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('selectBtn').disabled = true;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
