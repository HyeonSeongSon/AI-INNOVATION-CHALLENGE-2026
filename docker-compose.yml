version: '3'
name: final-project

x-opensearch-common-env: &opensearch-common-env
  cluster.name: opensearch-cluster
  discovery.seed_hosts: opensearch-node1,opensearch-node2,opensearch-node3
  cluster.initial_cluster_manager_nodes: opensearch-node1,opensearch-node2,opensearch-node3
  OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
  plugins.security.disabled: true

x-opensearch-healthcheck: &opensearch-healthcheck
  test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
  interval: 10s
  timeout: 5s
  retries: 10

x-opensearch-resources: &opensearch-resources
  deploy:
    resources:
      limits:
        memory: 1g

services:
  # [기존] OpenSearch 노드들
  opensearch-node1:
    image: opensearchproject/opensearch:3.1.0
    container_name: opensearch-node1
    environment:
      <<: *opensearch-common-env
      node.name: opensearch-node1
    <<: *opensearch-resources
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    healthcheck: *opensearch-healthcheck
    networks:
      - opensearch-net

  opensearch-node2:
    image: opensearchproject/opensearch:3.1.0
    container_name: opensearch-node2
    environment:
      <<: *opensearch-common-env
      node.name: opensearch-node2
    <<: *opensearch-resources
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
    ports:
      - 9201:9200
      - 9601:9600
    healthcheck: *opensearch-healthcheck
    networks:
      - opensearch-net

  opensearch-node3:
    image: opensearchproject/opensearch:3.1.0
    container_name: opensearch-node3
    environment:
      <<: *opensearch-common-env
      node.name: opensearch-node3
    <<: *opensearch-resources
    volumes:
      - opensearch-data3:/usr/share/opensearch/data
    ports:
      - 9202:9200
      - 9602:9600
    healthcheck: *opensearch-healthcheck
    networks:
      - opensearch-net

  # [기존] OpenSearch Dashboards
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.1.0
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-node1:9200","http://opensearch-node2:9200","http://opensearch-node3:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    networks:
      - opensearch-net
    depends_on:
      opensearch-node1:
        condition: service_healthy

  # =========================================================
  # [NEW] 쇼핑몰 데이터베이스 (PostgreSQL)
  # =========================================================
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-ai_innovation_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - opensearch-net

  # =========================================================
  # [NEW] DB 관리 도구 (pgAdmin) -> http://localhost:5050
  # =========================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai-innovation-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - opensearch-net
    depends_on:
      - postgres-db

  # =========================================================
  # [수정됨] 백엔드 서버 (FastAPI)
  # =========================================================
  fastapi-search:
    image: python:3.11-slim
    container_name: fastapi-search
    working_dir: /app
    command: >
      bash -c "
        pip install -r requirements.txt &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - .:/app
    ports:
      - "8010:8000"
    environment:
      # OpenSearch 연결 정보
      - OPENSEARCH_HOST=opensearch-node1
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      
      # [추가] OpenAI API 키
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # [추가] PostgreSQL 연결 정보
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ai_innovation_db}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
    networks:
      - opensearch-net
    depends_on:
      opensearch-node1:
        condition: service_healthy
      # [추가] DB가 켜져야 서버도 켜짐
      postgres-db:
        condition: service_started

volumes:
  opensearch-data1:
  opensearch-data2:
  opensearch-data3:
  postgres_data: # [추가] DB 데이터 영구 저장소

networks:
  opensearch-net: