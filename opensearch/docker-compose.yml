version: '3'
name: final-project

# 공통 환경 변수
x-opensearch-common-env: &opensearch-common-env
  cluster.name: opensearch-cluster
  discovery.type: single-node
  OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
  plugins.security.disabled: true

x-opensearch-healthcheck: &opensearch-healthcheck
  test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
  interval: 10s
  timeout: 5s
  retries: 10

services:
  # [1] OpenSearch 노드
  opensearch-node1:
    image: opensearchproject/opensearch:3.1.0
    container_name: opensearch-node1
    environment:
      <<: *opensearch-common-env
      node.name: opensearch-node1
    deploy:
      resources:
        limits:
          memory: 1g
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    healthcheck: *opensearch-healthcheck
    networks:
      - opensearch-net

  # [2] 대시보드
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.1.0
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-node1:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    networks:
      - opensearch-net
    depends_on:
      opensearch-node1:
        condition: service_healthy

  # [3] 검색 API
  fastapi-search:
    image: python:3.11-slim
    container_name: fastapi-search
    working_dir: /app
    command: >
      bash -c "
        pip install -r requirements.txt &&
        python opensearch_api.py
      "
    volumes:
      - .:/app
    ports:
      - 8010:8010
    environment:
      - OPENSEARCH_HOST=opensearch-node1
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
    networks:
      - opensearch-net
    depends_on:
      opensearch-node1:
        condition: service_healthy

  # [4] 백엔드 서버
  fastapi-backend:
    image: python:3.11-slim
    container_name: fastapi-backend
    working_dir: /app
    # 호스트 PC의 포트 접근 허용 (DB 연결용)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      bash -c "
        pip install -r /requirements.txt &&
        uvicorn backend.main:app --host 0.0.0.0 --port 8005 --reload
      "
    volumes:
      - ../backend:/app/backend         # 백엔드 코드 마운트
      - ../requirements.txt:/requirements.txt # 라이브러리 목록 마운트
      - ../database:/app/database       # database 폴더 마운트
    ports:
      - 8005:8005
    env_file:
      - ../backend/app/.env
    environment:
      - PYTHONPATH=/app/backend:/app:/app/database
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_innovation_db
    networks:
      - opensearch-net
    depends_on:
      opensearch-node1:
        condition: service_healthy

  # [5] pgAdmin (DB 관리 도구) - ✅ 추가됨
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - opensearch-net

volumes:
  opensearch-data1:
  pgadmin-data: # ✅ 추가됨

networks:
  opensearch-net: