---
name: ai_innovation_vector_db

x-opensearch-common-env: &opensearch-common-env
  cluster.name: opensearch-cluster
  discovery.seed_hosts: opensearch-node1,opensearch-node2,opensearch-node3
  cluster.initial_cluster_manager_nodes: opensearch-node1,opensearch-node2,opensearch-node3
  # bootstrap.memory_lock: true  # along with the memlock settings below, disables swapping
  OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m  # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
  OPENSEARCH_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
  plugins.security.allow_unsafe_democertificates: "true"
  plugins.security.allow_default_init_securityindex: "true"

x-opensearch-healthcheck: &opensearch-healthcheck
  test: ["CMD-SHELL", "curl -sk -u admin:${OPENSEARCH_ADMIN_PASSWORD} https://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"' || exit 1"]
  interval: 10s
  timeout: 5s
  retries: 15
  start_period: 60s

x-opensearch-resources: &opensearch-resources
  deploy:
    resources:
      limits:
        memory: 1g # 컨테이너 메모리 사용량을 1GB로 제한 (Java 힙 메모리보다 커야 함)

services:
  opensearch-node1:
    build:
      context: .
      dockerfile: Dockerfile.opensearch
    container_name: opensearch-node1
    environment:
      <<: *opensearch-common-env
      node.name: opensearch-node1
    <<: *opensearch-resources
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    expose:
      - "9200"
      - "9600"
    healthcheck: *opensearch-healthcheck
    networks:
      - msa-net
  opensearch-node2:
    build:
      context: .
      dockerfile: Dockerfile.opensearch
    container_name: opensearch-node2
    environment:
      <<: *opensearch-common-env
      node.name: opensearch-node2
    <<: *opensearch-resources
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
    expose:
      - "9200"
      - "9600"
    healthcheck: *opensearch-healthcheck
    networks:
      - msa-net
  opensearch-node3:
    build:
      context: .
      dockerfile: Dockerfile.opensearch
    container_name: opensearch-node3
    environment:
      <<: *opensearch-common-env
      node.name: opensearch-node3
    <<: *opensearch-resources
    volumes:
      - opensearch-data3:/usr/share/opensearch/data
    expose:
      - "9200"
      - "9600"
    healthcheck: *opensearch-healthcheck
    networks:
      - msa-net
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.1.0
    container_name: opensearch-dashboards
    ports:
      - "127.0.0.1:5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch-node1:9200","https://opensearch-node2:9200","https://opensearch-node3:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'false'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      OPENSEARCH_SSL_VERIFICATIONMODE: none
    networks:
      - msa-net
    depends_on:
      opensearch-node1:
        condition: service_healthy
      opensearch-node2:
        condition: service_healthy
      opensearch-node3:
        condition: service_healthy

  fastapi-search:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fastapi-search
    working_dir: /app
    command: sh -c "python index_forbidden_sentences.py && python opensearch_api.py"
    volumes:
      - .:/app
      - ../backend/app/agents/generate_message_agent/data/forbidden_keyword.json:/app/data/forbidden_keyword.json:ro
    expose:
      - "8010"
    env_file:
      - .env
    environment:
      - OPENSEARCH_HOST=opensearch-node1
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - ENVIRONMENT=production
      # 볼륨 마운트 위치(/app/data/...)를 인덱싱 스크립트에 명시. 미설정 시 컨테이너 내에서
      # DEFAULT_JSON_PATH가 /backend/... 로 잡혀 파일을 못 찾아 색인 단계가 exit 1 → 컨테이너 종료.
      - FORBIDDEN_KEYWORD_JSON_PATH=/app/data/forbidden_keyword.json
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - msa-net
    depends_on:
      opensearch-node1:
        condition: service_healthy
      opensearch-node2:
        condition: service_healthy
      opensearch-node3:
        condition: service_healthy

volumes:
  opensearch-data1:
  opensearch-data2:
  opensearch-data3:

networks:
  msa-net:
    external: true
